<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Mystery Box Pro</title>
<!-- FAVICON -->
<link rel="icon" href="https://i.ibb.co/35kzSv2C/image.png" type="image/png">
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
/* BACKGROUND FULL */
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://i.ibb.co/B2SsPzDF/image.png') no-repeat center center;
  background-size:cover;
  color:white;
  text-align:center;
.container {
  margin-top: 30px;
}
.box {
  width: 120px;
  height: 120px;
  background: gold;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 15px;
  border-radius: 15px;
  cursor: pointer;
  font-size: 20px;
  font-weight: bold;
  transition: 0.3s;
}
.box:hover {
  transform: scale(1.1);
}
.opening {
  animation: buka 0.6s ease;
}
@keyframes buka {
  0% { transform: rotateY(0); }
  100% { transform: rotateY(180deg); }
}
button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: orange;
  color: white;
}
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}
</style>
</head>
<body>
<h1>🎁 Mystery Box Pro</h1>
<div id="login">
<input type="text" id="username" placeholder="Masukkan username">
<button onclick="login()">Login</button>
</div>
<div id="game" style="display:none;">
<h3>Halo, <span id="user"></span></h3>
<h3>Saldo: <span id="saldo"></span></h3>
  <button onclick="buyBox()">Buka Box (Rp 50.000)</button>
  <div class="container" id="boxes"></div>
  <h2 id="result"></h2>
  <button onclick="withdraw()">Tarik Saldo</button>
<button onclick="logout()">Logout</button>
</div>
<script>
const hadiahList = [10000,50000,100000,250000,500000,1000000,2000000];
function formatRupiah(angka){
  return "Rp " + angka.toLocaleString("id-ID");
}
function login(){
  let username = document.getElementById("username").value;
  if(!username) return alert("Masukkan username!");
  localStorage.setItem("user", username);
  if(!localStorage.getItem("saldo")){
    localStorage.setItem("saldo", 100000); // saldo awal
  }
  loadGame();
}
function loadGame(){
  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("user").innerText = localStorage.getItem("user");
  updateSaldo();
}
function updateSaldo(){
  let saldo = parseInt(localStorage.getItem("saldo"));
  document.getElementById("saldo").innerText = formatRupiah(saldo);
}
function buyBox(){
  let saldo = parseInt(localStorage.getItem("saldo"));
  if(saldo < 50000){
    return alert("Saldo tidak cukup!");
  }
  saldo -= 50000;
  localStorage.setItem("saldo", saldo);
  updateSaldo();
  generateBox();
}
function generateBox(){
  const container = document.getElementById("boxes");
  container.innerHTML = "";
  for(let i=0;i<3;i++){
    let box = document.createElement("div");
    box.classList.add("box");
    box.innerText = "?";
    let hadiah = hadiahList[Math.floor(Math.random()*hadiahList.length)];
    box.onclick = () => openBox(box, hadiah);
    container.appendChild(box);
  }
}
function openBox(box, hadiah){
  if(box.classList.contains("opened")) return;
  box.classList.add("opening");
  setTimeout(()=>{
    box.classList.remove("opening");
    box.classList.add("opened");
    box.innerText = formatRupiah(hadiah);
    let saldo = parseInt(localStorage.getItem("saldo"));
    saldo += hadiah;
    localStorage.setItem("saldo", saldo);
    document.getElementById("result").innerText = 
      "🎉 Kamu dapat " + formatRupiah(hadiah);
    updateSaldo();
    // disable semua box
    document.querySelectorAll(".box").forEach(b => b.onclick = null);
  }, 600);
}
function withdraw(){
  let saldo = parseInt(localStorage.getItem("saldo"));
  if(saldo < 50000){
    return alert("Minimal withdraw Rp 50.000");
  }
  alert("Withdraw berhasil: " + formatRupiah(saldo));
  localStorage.setItem("saldo", 0);
  updateSaldo();
}
function logout(){
  localStorage.clear();
  location.reload();
}
// auto login kalau sudah ada user
if(localStorage.getItem("user")){
  loadGame();
}
</script>
</body>
</html>
